ff":94,"unit":"DAYS","timestamp":1770036187513},"dateOriginal":{"diff":94,"unit":"DAYS","timestamp":1770036187513},"description":"En una de las avenidas más emblemáticas y populares de la ciudad, Ollerías, a un paso del centro y muy cerca de la Plaza de Colón, se alza este edificio donde la historia y la vida urbana se dan la mano. Desde sus alrededores se contempla la inconfundible Torre de la Malmuerta, un símbolo que convierte cada paseo en una experiencia única.\\n\\nEl edificio, de solo cinco plantas y dos vecinos por planta, ofrece tranquilidad, privacidad y una exclusiva azotea comunitaria para disfrutar del cielo y las vistas de la ciudad.\\n\\nLa vivienda es totalmente exterior, bañada por la luz natural durante todo el día y con vistas abiertas a la avenida, que aportan amplitud y una sensación constante de vida y movimiento.\\n\\nAl entrar, nos recibe una gran cocina independiente, luminosa y funcional, con agradables vistas a un enorme y bonito patio interior, perfecto para disfrutar del día a día con calma y desahogo visual.\\n\\nEl salón es espectacular, amplio y elegante, con espacio de sobra para crear diferentes ambientes. Desde aquí se accede a una gran terraza, un auténtico privilegio con vistas directas a la avenida, ideal para desayunos al sol, tardes de lectura o noches al aire libre.\\n\\nLa zona de descanso se compone de tres dormitorios, todos con armarios empotrados, destacando el dormitorio principal tipo suite, pensado para el máximo confort. La vivienda cuenta además con dos baños completos, diseñados para la comodidad de toda la familia.\\n\\nComo valor añadido imprescindible, incluye plaza de garaje en el mismo edificio, algo excepcional en esta ubicación tan céntrica.\\n\\nUna vivienda que no solo se vive, se siente. Luz, espacio, ubicación y calidad de vida en una de las zonas con más personalidad de la ciudad.\\n\\nTe esperamos, ven a visitarla!!!!!!!!!!! \\n*Información adicional: Para cumplir con la normativa vigente tenemos a dis r":"#F03A4E","logo":null,"textColor":"#FFFFFF"},"buildingSubtype":"Flat","buildingType":"Flat","clientAlias":"TuCasaCórdoba","clientId":9202754980389,"clientType":"professional","clientTypeId":3,"clientUrl":"/es/inmobiliaria-tucasacordoba/comprar/inmuebles/espana/todas-las-zonas/l?clientId=9202754980389\u0026publisherId=c86ad295-0786-4f7b-9675-4306f98bf9c4","coordinates":{"latitude":37.89955644422781,"longitude":-4.7836091969786265,"accuracy":0},"date":{"diff":1,"unit":"DAYS","timestamp":1778073532913},"dateOriginal":{"diff":1,"unit":"DAYS","timestamp":1778073532913},"description":"\\n¿Buscas un hogar donde solo tengas que traer tus maletas? En Tu Casa Córdoba te presentamos en exclusiva esta joya recién reformada, ubicada en la aclamada zona de Los Árboles, en Santa Rosa. Un piso que combina una estética impecable y actual con la funcionalidad que necesitas.\\n\\n🏠 ESPACIOS DISEÑADOS PARA VIVIR\\nCon 75 m2 construidos magistralmente aprovechados, esta vivienda destaca por su luz y su distribución inteligente:\\n\\nSalón de Ensueño: Un espacio acogedor y elegante que se convierte en el corazón de la casa, con acceso directo a una coqueta terraza donde disfrutar del aire libre.\\n\\nCocina Independiente: Totalmente equipada con mobiliario moderno y electrodomésticos (a excepción del frigorífico), optimizada para los amantes de la cocina.\\n\\nZona de Descanso: Consta de 3 dormitorios (uno doble principal y dos sencillos), perfectos para familias, despacho o cuarto de invitados. El dormitorio principal cuenta con un práctico armario empotrado.\\n\\nBaño: Reformado con un estilo limpio y funcional, equipado con placa de ducha.\\n\\n💎 CALIDADES QUE MARCAN LA DIFERENCIA\\nLa reforma se ha hecho pensando en el detalle y el confort térmico y acústico:\\n✅ Suelos de tarima que aportan calidez a cada estancia.\\n✅ Cierres de aluminio Climalit para un aislamiento perfecto.\\n✅ Puertas de madera lacadas en blanco, aportando un toque de amplitud y modernidad.\\n✅ Climatización: Sistema de A/A por splits para garantizar la temperatura ideal todo el año.\\n\\nLa vivienda se entrega sin amueblar (a excepción de la cocina y el baño).\\n\\n🏙️ UBICACIÓN Y EXTRAS EXCLUSIVOS\\nVivir en la zona de Los Árboles es sinónimo de calidad de vida. El edificio cuenta con ascensor y, lo más difícil de encontrar en la zona: posibilidad de zona de aparcamiento privada (comunitaria sin plaza adjudicada), un alivio para tu día a día.\\n\\nTodo esto rodeado de los mejores colegios, comercios locales, zonas verdes y a un paso del centro.\\n\\n¿Es esta la oportunidad que estabas esperando? Las viviendas con este nivel de reforma y en esta ubicación vuelan del mercado. ¡No dejes que se te adelanten!\\n\\n📞 Llámanos ahora al 957 080 310 y concierta tu visita.\\n📍 Oficina Centro: Calle Cruz Conde, 24 – 1º Derecha.\\n\\n#TuCasaCordoba #SantaRosa #ZonaLosArboles #PisoReformado #VentaCordoba #InversionInteligente #HogarElegante #CordobaEsp #InmobiliariaCentro\\n\\nINFORMACIÓN IMPORTANTE. En cumplimiento de la normativa vigente tenemos a disposición del cliente Documento de información Abreviada. Los precios indicados no tienen caducidad, pero pueden ser alterados sin previo aviso. Los GASTOS DE LA COMPRA son Según ley (Notaria, Registro e Impuestos) y no están incluidos. Los Honorarios de la agencia NO están incluidos.\\nA menos que la oferta así lo especifique, el precio del inmueble no incluye el contenido: mobiliario, electrodomésticos, ropa, herramientas, vehículos o cualquier artículo o elemento decorativo que puedan aparecer en las imágenes.","detail":{"es-ES":"/es/comprar/vivienda/cordoba-capital/aire-acondicionado-terraza-ascensor/189600876/d"},"detailWithParams":{"es-ES":"/es/comprar/vivienda/cordoba-capital/aire-acondicionado-terraza-ascensor/189600876/d?from=list"},"dynamicFeatures":["IS_EXTERIOR","IS_MODERN"],"externalContactUrl":null,"features":[{"key":"air_conditioner","value":1,"maxValue":0,"minValue":0},{"key":"cabinets","value":2,"maxValue":0,"minValue b-9675-4306f98bf9c4","rawPrice":197000,"realEstateAdId":"27b31741-2441-424c-b1b4-3404bf0d2305","reducedPrice":null,"subtypeId":1,"transactionTypeId":1,"typeId":2,"userId":null},{"accuracy":false,"address":{"country":"España","district":"Periurbano Oeste - Sierra","neighborhood":"El Higuerón","zipCode":"14005","municipality":" Córdoba Capital","province":"Córdoba","city":" Córdoba Capital","cityZone":null,"county":"Córdoba, Zona de ","regionLevel1":"Andalucía","regionLevel2":"Córdoba","upperLevel":"El Higuerón"},"brandInfo":{"barColor":"#020202","logo":null,"textColor":"#FFFFFF"},"buildingSubtype":"CountryHouse","buildingType":"Flat","clientAlias":"Inmobiliaria Barin","clientId":900040000042,"clientType":"professional","clientTypeId":3,"clientUrl":"/es/inmobiliaria-inmobiliaria-barin/comprar/inmuebles/espana/todas-las-zonas/l?clientId=900040000042\u0026publisherId=56556381-eef3-4df3-998c-3f21929a51db","coordinates":{"latitude":37.86309580766693,"longitude":-4.8271733924524955,"accuracy":0},"date":{"diff":65,"unit":"DAYS","timestamp":1772543863393},"dateOriginal":{"diff":65,"unit":"DAYS","timestamp":1772543863393},"description":"Vivir en una parcela suele significar dos cosas: \\n\\nO te dejas el sueldo en gasolina para llevar a los niños al cole, o te bañas con agua de pozo rezando para que no se seque. \\n\\nSi estás harto de pagar un alquiler por un piso caluroso en el centro y sueñas con barbacoas y espacio, pero tu presupuesto no llega a los lujos de El Brillante, esto te interesa.\\n\\nAquí no compras posibilidades, compras calidad de vida inmediata. \\n\\nEsta casa de 120 m2 está lista para que traigas las maletas mañana mismo.\\n\\n•\\tOlvídate del coche: Tienes el supermercado, la farmacia y el colegio a un paseo andando. Es la comodidad de un piso con la libertad de una parcela de 500 m2\\n\\n•\\tVeranos de verdad: Piscina de agua salada (mucho mejor para la piel y menos mantenimiento) y un porche donde realmente harás vida.\\n\\n•\\tConfort total: Nada de pasar frío o calor. Tienes aire centralizado, preinstalación de chimenea para el invierno y una estufa de pelets que los propietarios dejan\\n\\n•\\tServicios de ciudad: Aquí tienes luz de red y agua potable. \\n\\nPreguntas que te puedes hacer:\\n\\n•\\t¿Se puede hipotecar? No… Es muy importante que lo sepas antes de venir: solo tiene escrituras del terreno. Es una compra para quien tiene los ahorros y busca rentabilizarlos en bienestar, no para quien necesita al banco.\\n\\n•\\t¿Hay que reformar algo? Nada. La construcción es de 2019. Suelos de mármol, ventanas de Climalit y todo impecable.\\n\\n•\\t¿Es el precio final? El valor es justo por la ubicación y el estado, pero como todo en esta vida, si hay un interés real y solvencia, siempre se puede hablar.\\n\\nSi tienes el capital disponible y estás cansado de ver \\"casas de campo\\" que se caen a trozos, llámame. Si necesitas hipoteca para la compra, lamentablemente esta no es tu casa.\\n \\n*Información adicional: Para cumplir con la normativa vigente tenemos a disposición del cliente el Documento de Información Abreviada D. I. A. Los precios indicados no tienen caducidad, pero pueden ser alterados sin previo aviso. \\n\\n**Para inmuebles en venta: Los gastos de la compra según Ley (Notaria, Registro e Impuestos) no están incluidos. El mobiliario que aparece en las fotografías no está incluido.  Los Honorarios de la agencia no están incluidos.\\n\\n*** Para inmuebles en alquiler: Los Honorarios de la agencia no están incluidos.  Vivienda de uso estable y permanente, exentas de honorarios por parte del inquilino.","detail":{"es-ES":"/es/comprar/vivienda/cordoba-capital/aire-acondicionado-jardin-trastero-piscina/188995389/d"},"detailWithParams":{"es-ES":"/es/comprar/vivienda/cordoba-capital/aire-acondicionado-jardin-trastero-piscina/188995389/d?from=list"},"dynamicFeatures":["HAS_A_FIREPLACE","IS_ON_THE_COUNTRYSIDE","IS_SINGLE_FAMILY_HOME"],"externalContactUrl":null,"features":[{"key":"air_conditioner","value":1," ccuracy":1},"date":{"diff":11,"unit":"DAYS","timestamp":1777206648153},"dateOriginal":{"diff":11,"unit":"DAYS","timestamp":1777206648153},"description":"🌿 CASA UNIFAMILIAR CON JARDÍN, PISCINA Y PATIO EN EL CORAZÓN HISTÓRICO DE CÓRDOBA — JUNTO AL AYUNTAMIENTO NUEVO\\n\\n438 m² construidos · Parcela 392 m² · 9 habitaciones · 3 baños · Biblioteca · Despacho · Piscina privada · Jardín · 3 plantas\\n\\nHay inmuebles que se venden una vez cada generación. Este es uno de ellos.\\n\\nUna casa unifamiliar de 438 m² construidos, con jardín privado ajardinado, piscina, tres plantas habitables, nueve estancias, biblioteca, despacho y patio interior, situada en pleno casco histórico de Córdoba, a pasos del Ayuntamiento Nuevo, en una zona que ha sido objeto de restauración y puesta en valor recientemente.\\n\\nEl inmueble, construido en 1963 sobre una parcela de 392 m², conserva la estructura y los materiales de la arquitectura tradicional cordobesa — muros de carga de ladrillo, carpintería de madera, forja, patio principal con galería — y dispone de jardín privado con árboles frutales, piscina propia y construcciones auxiliares. Todo ello en una de las tramas urbanas más demandadas de Córdoba capital.\\n\\nLA VIVIENDA EN DETALLE:\\n· 9 habitaciones (incluyendo biblioteca, despacho y 3 estudios)\\n· 3 baños completos + aseos auxiliares de piscina\\n· 3 salones / estar distribuidos en 3 plantas\\n· Cocina-oficio en planta principal\\n· Jardín privado con árboles frutales\\n· Piscina propia (44 m²) + aseos y vestuarios auxiliares\\n· Patio interior con galería perimetral\\n· Azotea transitable — cubierta plana de hormigón\\n· Calefacción y aire acondicionado individuales\\n· Fontanería de cobre · Electricidad operativa\\n\\nESTADO Y POTENCIAL:\\nLa instalación eléctrica está operativa, la fontanería es de red de cobre y dispone de calefacción y aire acondicionado. La estructura es sólida — muros de carga de ladrillo y forjados de vigueta de hormigón. El deterioro es principalmente estético en planta baja, lo que lo convierte en un proyecto de rehabilitación altamente rentable sin necesidad de intervención estructural.\\n\\nNOTA SOBRE LAS IMÁGENES:\\nSe han incorporado fotografías generadas con inteligencia artificial para visualizar el potencial de las zonas que en el estado actual presentan mayor deterioro estético — principalmente la planta baja, el jardín y la piscina. Estas imágenes están claramente identificadas como \\"Propuesta de reforma / AI visualization\\". El resto de fotografías corresponden al estado real del inmueble.\\n\\nUSOS POSIBLES:\\n🏡 Vivienda familiar de lujo · 9 habitaciones, jardín y piscina en el centro histórico\\n🏨 Hotel boutique o casa rural · Distribución ideal para establecimiento turístico\\n🌿 Casa de huéspedes / B\u0026B · Rentabilidad turística muy por encima de la media cordobesa\\n📈 Inversión patrimonial ·  Precio bajo valor de reemplazamiento\\n\\nUBICACIÓN:\\nEntorno inmediato del Ayuntamiento Nuevo de Córdoba, zona con importante inversión en restauración reciente. La Mezquita-Catedral, la Judería y el Puente Romano a distancia peatonal.\\n\\nUna casa así, en este rincón de Córdoba, no vuelve a salir al mercado en años.\\nSolicita visita privada · Tasación disponible · Sin compromiso\\n\\nINFORMACION ADICIONAL\\n\\nEl precio indicado no incluye gastos derivados de la compraventa, tales como notaría, registro e impuestos, que se regirán por la legislación vigente.\\n\\nHonorarios de la agencia inmobiliaria no incluidos. Los honorarios de intermediación inmobiliaria ascienden al 1.5 % del precio de venta más IVA con un mínimo de 3.000 € + IVA, no incluidos en el precio de venta. Incluyen el asesoramiento integral durante todo el proceso de compraventa, acompañamiento en negociación, coordinación documental entre las partes y seguimiento hasta firma de escritura.\\n\\nFINANCIACIÓN\\n\\nOfrecemos asesoramiento financiero personalizado sin coste para ayudarte a encontrar la mejor opción de hipoteca.\\n\\nEn caso de que el comprador desee gestión de financiación hipotecaria, este servicio se presta de forma independiente y opcional, con honorarios propios, no incluidos en los honorarios de intermediación inmobiliaria anteriormente indicados \\n\\n¡Ven a visitarlo y enamórate de tu futuro hogar!","detail":{"es-ES":"/es/comprar/vivienda/cordoba-capital/aire-acondicionado-jardin-terraza-trastero-patio-piscina-no-amueblado/189498595/d"},"detailWithParams":{"es-ES":"/es/comprar/vivienda/cordoba-capital/aire-acondicionado-jardin-terraza-trastero-patio-piscina-no-amueblado/189498595/d?from=list"},"dynamicFeatures":["IS_SINGLE_FAMILY_HOME"],"externalContactUrl":null,"features":[{"key":"air_conditioner","value":1,"maxValue":0,"minValue":0},{"key":"cabinets","value":2,"maxValue":0,"minValue":0},{"key":"ceramic_stoneware","value":6,"maxValue":0,"minValue":0},{"key":"private_garden","value":7,"maxValue":0,"minValue":0},{"key":"terrace","value":10,"maxValue":0,"minValue":0},{"key":"storage_room","value":11,"maxValue":0,"minValue":0},{"key":"yard","value":16,"maxValue":0,"minValue":0},{"key":"swimming_pool","value":17,"maxValue":0,"minValue":0},{"key":"household_appliances","value":21,"maxValue":0,"minValue":0},{"key":"balcony","value":32,"maxValue":0,"minValue":0},{"key":"armored_door","value":84,"maxValue":0,"minValue":0},{"key":"laundry","value":109,"maxValue":0,"minValue":0},{"key":"not_furnished","value":130,"maxValue":0,"minValue":0},{"key":"equiped_kitchen","value":131,"maxValue":0,"minValue":0},{"key":"antiquity","value":7,"maxValue":0,"minValue":0},{"key":"bathrooms","value":4,"maxValue":0,"minValue":0},{"key":"conservationStatus","value":3,"maxValue":0,"minValue":0},{"key":"hotWater","value":4,"maxValue":0,"minValue":0},{"key":"orientation","value":6,"maxValue":0,"minValue":0},{"key":"rooms","value":9,"maxValue":0,"minValue":0},{"key":"surface","value":494,"maxValue":0,"minValue":0}],"hasListLogo":true,"hasSubsidies":false,"hasVideo":1,"hasQualitySeal":false,"hasFloorPlans": 494-a6de-4bb3-a4a5-a5c64e52397d","reducedPrice":"4.000 €","subtypeId":1,"transactionTypeId":1,"typeId":2,"userId":null},{"accuracy":true,"address":{"country":"España","district":"Poniente-Norte - Miralbaida - Parque Azahara","neighborhood":null,"zipCode":"14011","municipality":" Córdoba Capital","province":"Córdoba","city":" Córdoba Capital","cityZone":null,"county":"Córdoba, Zona de ","regionLevel1":"Andalucía","regionLevel2":"Córdoba","upperLevel":null},"brandInfo":{"barColor":"#F5F5F5","logo":null,"textColor":"#1D1D1D"},"buildingSubtype":"Attic","buildingType":"Flat","clientAlias":"DURNA GESTION","clientId":9202756644852,"clientType":"professional","clientTypeId":3,"clientUrl":"/es/inmobiliaria-durna-gestion/comprar/inmuebles/espana/todas-las-zonas/l?clientId=9202756644852\u0026publisherId=85069e5f-3aef-4052-ba41-71e202960475","coordinates":{"latitude":37.893962249828,"longitude":-4.8125883432081,"accuracy":1},"date":{"diff":2,"unit":"DAYS","timestamp":1777978553833},"dateOriginal":{"diff":2,"unit":"DAYS","timestamp":1777978553833},"description":"¿Quieres vivir en una de las viviendas más exclusivas de Córdoba? ¿Te imaginas con tus amigos en la terraza solarium con vistas a la sierra y disfrutando de tu piscina privada? Este ático dúplex  se ubica en una de las zonas más demandadas de la ciudad, muy cerca del Corte Inglés(Hipercor) y a escasos metros de la Ronda Norte y Oeste. Se trata de una propiedad única concebida para quienes buscan exclusividad, diseño y máximo confort. Cada detalle ha sido cuidadosamente pensado para ofrecer una experiencia de vida sofisticada y contemporánea.\\n\\nDISTRIBUCIÓN: \\n\\nAl entrar en la vivienda, se percibe inmediatamente la sensación de distinción, su amplitud y luminosidad dan paso a un gran salón-comedor con cocina abierta con una isla(Península) ideal para aprovecharla a diario. Los amplios ventanales aportan abundante luz, la vivienda es completamente exterior con orientación este, sur y oeste. La elegancia del espacio crea una conexión fluida entre la zona de día, la de noche y el acceso al solarium de planta alta. \\n\\nLa zona de descanso se compone de tres dormitorios muy luminosos. Todos ellos disfrutan de una excelente entrada de luz natural, creando ambientes cálidos y agradables. La vivienda cuenta con dos baños completos, destacando el baño principal de generosas dimensiones, en suite, integrado en el dormitorio principal, que se convierte en un auténtico espacio de bienestar y privacidad.\\n\\nSubiendo a la planta alta encontramos la joya de la corona, una impresionante terraza privada de 70 metros cuadrados, un espacio excepcional que eleva esta propiedad a un nivel superior. Dotada de piscina privada, zona solárium, amplias áreas para el descanso y el ocio al aire libre y con vistas abiertas a Córdoba y a la sierra, vistas casi 360º. En la cubierta puedes disfrutar para tomar el sol, darte un baño, disfrutar de una barbacoa o tomar con amigos unas copas bajo una fantástica pérgola bioclimática con un techo de lamas orientables y motorizadas. Permite regular de forma natural la temperatura, luz, ventilación y protección contra la lluvia. Ajusta el ambiente exterior, proporcionando sombra y ventilación en verano, mientras deja pasar luz en invierno. \\n\\nEl precio incluye una de las mejores plazas de garaje y un trastero en el mismo edificio.\\n\\nCalidades premium: Aerotermia, cierres ventanas oscilobatientes y climalit, persianas eléctricas...\\n\\nEl precio de venta del inmueble no incluye impuestos ni gastos derivados de la transmisión (Impuesto de Transmisiones Patrimoniales), ni otros gastos asociados tales como Notaría, Registro de la Propiedad, tasación o financiación.\\nLos honorarios profesionales de intermediación no están incluidos en el precio y serán informados de manera individual, previa y por escrito.\\nDocumento F.I.A. disponible para la persona consumidora.\\n","detail":{"es-ES":"/es/comprar/vivienda/cordoba-capital/parking-jardin-terraza-trastero-asce ovince":"Córdoba","city":" Córdoba Capital","cityZone":null,"county":"Córdoba, Zona de ","regionLevel1":"Andalucía","regionLevel2":"Córdoba","upperLevel":"Zona Centro"},"brandInfo":{"barColor":"#F03A4E","logo":null,"textColor":"#FFFFFF"},"buildingSubtype":"Flat","buildingType":"Flat","clientAlias":"Inmobiliaria Seneca","clientId":9202771714845,"clientType":"professional","clientTypeId":3,"clientUrl":"/es/inmobiliaria-inmobiliaria-seneca/comprar/inmuebles/espana/todas-las-zonas/l?clientId=9202771714845\u0026publisherId=f84c4e6a-b22e-4669-b368-cb82b0abdc6a","coordinates":{"latitude":37.88823907398343,"longitude":-4.782388101753121,"accuracy":0},"date":{"diff":61,"unit":"DAYS","timestamp":1772878521603},"dateOriginal":{"diff":61,"unit":"DAYS","timestamp":1772878521603},"description":"Piso reformado y listo para entrar a vivir en edificio histórico – Gran Capitán\\n\\n\\n450.000 € | 153 m² | 3 dormitorios | 3 baños | Vestidor | Ascensor | Trastero\\n\\n\\nVivienda reformada recientemente y lista para entrar a vivir, situada en un edificio histórico de 1926 completamente rehabilitado, con ascensor, en plena Avenida Gran Capitán, una de las direcciones más emblemáticas y representativas de Córdoba.\\n\\n\\nEl piso combina el carácter original del edificio con una distribución cómoda y funcional adaptada a las necesidades actuales. Destacan los techos altos y los amplios ventanales, elementos característicos de la arquitectura de la época que aportan amplitud y luminosidad a las estancias.\\n\\n\\nLa vivienda cuenta además con carpintería completamente renovada, con ventanas y puertas nuevas, lo que mejora el confort y el aislamiento manteniendo la estética del conjunto.\\n\\n\\nLa zona de día se organiza alrededor de un amplio salón con balcón a la avenida, un espacio especialmente luminoso con vistas a una de las arterias principales de la ciudad.\\n\\n\\nLa vivienda dispone de tres dormitorios y tres baños completos, dos de ellos en suite, una configuración poco habitual en el centro de Córdoba.\\n\\n\\n⸻\\n\\n\\nDistribución\\n\\n\\n* Amplio salón con balcón a Avenida Gran Capitán\\n* Cocina independiente\\n* Dormitorio principal con baño en suite y vestidor independiente\\n* Segundo dormitorio con baño en suite y gran armario empotrado a medida con amplia capacidad de almacenamiento\\n* Tercer dormitorio\\n* Tercer baño completo\\n* Lavadero independiente\\n\\n\\nLa propiedad incluye además trastero en el edificio. Existe la posibilidad de alquilar o disponer de plaza de garaje a pocos metros de la vivienda, algo especialmente práctico en esta zona del centro.\\n\\n\\nUbicada en pleno centro de Córdoba, rodeada de comercios, restauración y todos los servicios, a pocos minutos a pie del casco histórico.\\n\\n\\nUna vivienda singular por su amplitud, distribución y carácter arquitectónico, situada en uno de los edificios con más personalidad de la avenida.\\n\\n\\n\\n\\n\\n\\n\\n\\nPara más información y concertar una visita, contacte con:\\nINMOBILIARIA SÉNECA\\n957 958 065\\ninfo@inmobiliariaseneca.es\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\n\\nFINANCIACIÓN: Con un estudio previo gratuito y personalizado. \\nINFORMACIÓN IMPORTANTE: Para cumplir con la normativa vigente, tenemos a disposición del cliente Documento de Información Abreviada D.I.A. Los precios indicados no tienen caducidad, pero pueden ser alterados sin previo aviso\\nGASTOS DE LA COMPRA: Según Ley (Notaría, Registro e Impuestos) no incluidos. Los honorarios de la Agencia Inmobiliaria no están incluidos.\\n","detail":{"es-ES":"/es/comprar/vivienda/cordoba-capital/aire-acondicionado-calefaccion-terraza-trastero-ascensor-no-amueblado/189038696/d"},"detailWithParams":{"es-ES":"/es/comprar/vivienda/cordoba-capital/aire-acondicionado-calefaccion-terraza-trastero-ascensor-no-amueblado/189038696/d?from=list"},"dynamicFeatures":["IS_EXTERIOR"],"externalContactUrl":null,"features":[{"key":"air_conditioner","value":1,"maxValue":0,"minValue":0},{"key":"cabinets","value": dos ni rincones sin sentido. Una base sólida para quien quiera hacer de este piso exactamente lo que siempre ha soñado.\\n\\n✅ Lo que lo hace diferente:\\n· Orientación sur-oeste — luz durante todo el día\\n· Solo 6 vecinos — convivencia tranquila y cuidada\\n· Electricidad renovada a normativa actual — inversión ya hecha\\n· Trastero escriturado en azotea transitable — espacio extra real\\n· Parada de bus en la puerta\\n· 5 minutos de la Avenida de Barcelona y del centro histórico\\n\\n📍 San Lorenzo, Calle Escañuela — en el corazón auténtico de Córdoba.\\n\\n¿Cuántos pisos así quedan en San Lorenzo? La respuesta te sorprenderá. Solicita visita antes de que otro se adelante.\\n\\n✨ An apartment flooded with Andalusian light — and a neighbourhood that never loses its soul\\nCalle Escañuela · San Lorenzo District · Córdoba, Spain\\n\\nThose who know Córdoba know that San Lorenzo is where authentic city life still breathes. Calle Escañuela sits at the heart of it — walkable to the Mosque-Cathedral, the Roman Bridge, and the everyday rhythm of a neighbourhood that has never needed to reinvent itself.\\n\\n☀ All-day natural light. The finest light arrives at midday and stays until the sun sets over the west — the golden Córdoba afternoon, pouring through every room. South and west-facing, this apartment is bright from dawn to dusk.\\n\\nThe rooms are genuinely spacious — generous double bedrooms, an efficient floorplan with zero wasted space, and a blank canvas ready for a buyer with vision.\\n\\n✅ What makes this property exceptional:\\n· South \u0026 west orientation — sun-filled from morning to evening\\n· Only 6 neighbours — an exceptionally quiet community\\n· Fully rewired to current EU electrical regulations — done\\n· Deeded private storage on a walk-up roof terrace\\n· City bus stop directly at the front door\\n· 5-minute walk to Av. Barcelona \u0026 the historic centre\\n\\nProperties with this combination of location, light, and layout in San Lorenzo rarely reach the open market. When they do, they move fast.\\n\\n📍 San Lorenzo, Calle Escañuela — at the authentic heart of historic Córdoba.\\n\\nHow many apartments like this still exist in the heart of historic Córdoba? Request a private viewing before someone else does.\\n\\nCondiciones Generales de Precio y Compraventa\\n\\nLos precios indicados no tienen fecha de caducidad, aunque están sujetos a modificaciones sin previo aviso. El importe señalado corresponde exclusivamente al valor del inmueble.\\n\\nLos gastos derivados de la compraventa —incluyendo Notaría, Registro de la Propiedad e impuestos aplicables— se regirán por la legislación vigente y no están incluidos en el precio del inmueble. Los honorarios de la agencia no están incluidos. \\n\\nInformación adicional\\n\\nEl precio indicado no incluye gastos derivados de la compraventa, tales como notaría, registro e impuestos, que se regirán por la legislación vigente.\\n\\nHonorarios de la agencia inmobiliaria no incluidos. Los honorarios de intermediación inmobiliaria ascienden a 3.000 € + IVA, no incluidos en el precio de venta. Incluyen el asesoramiento integral durante todo el proceso de compraventa, acompañamiento en negociación, coordinación documental entre las partes y seguimiento hasta firma de escritura. \\n\\nFinanciación\\n\\nOfrecemos asesoramiento financiero personalizado sin coste para ayudarte a encontrar la mejor opción de hipoteca.\\n\\nEn cumplimiento de la normativa vigente tenemos a disposición del cliente Documento de información Abreviada. Los precios indicados no tienen caducidad, pero pueden ser alterados sin previo aviso.\\n\\n\\n¡Ven a visitarlo y enamórate de tu futuro hogar!","detail":{"es-ES":"/es/comprar/vivienda/cordoba-capital/aire-acondicionado-calefaccion-trastero-amueblado/188459199/d"},"detailWithParams":{"es-ES":"/es/comprar/vivienda/cordoba-capital/aire-acondicionado-calefaccion-trastero-amueblado/188459199/d?from=list"},"dynamicFeatures":["IS_EXTERIOR"],"externalContactUrl":n
