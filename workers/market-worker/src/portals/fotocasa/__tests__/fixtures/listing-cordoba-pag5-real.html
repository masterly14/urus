estíbulo te recibe aportando privacidad y funcionalidad, con acceso de doble puerta hacia el amplio salón, perfecto para el día a día. Dispone de tres dormitorios, dos de ellos dobles con armario empotrado, y uno de estos con baño en suite completo con bañera.\\n\\nLa cocina es independiente y se entrega amueblada y equipada con electrodomésticos, ofreciendo comodidad desde el primer momento. Desde el pasillo se accede a un patio privado que añade un espacio exterior muy práctico y agradable. Otro baño completo con placa de ducha da servicio al resto de la vivienda.\\n\\nEntre sus calidades destacan los suelos de mármol, las ventanas de doble acristalamiento, las puertas interiores lacadas en blanco, dos armarios empotrados, preinstalación de aire acondicionado y un termo eléctrico de 80 litros, que aportan confort y eficiencia.\\n\\nSe trata de un piso funcional y bien ubicado, ideal tanto como primera vivienda como inversión. No dejes pasar esta oportunidad y contáctanos para concertar una visita.\\n\\nCláusula de Transparencia y Desglose de Gastos (Ley 10/2025)\\n PRECIO DE VENTA + GASTOS\\n En cumplimiento de las obligaciones de información previstas en la Ley 10/2025, de 28 de diciembre, de servicios de atención a la clientela y transparencia, así como en la normativa sectorial vigente, se hace constar que el precio indicado no incluye los gastos e impuestos inherentes a la adquisición, los cuales se desglosan a continuación:\\n * Honorarios Agencia del comprador: 2,5 % del precio final de venta más el 21% de IVA (con un mínimo de 3.600 € más el 21% de IVA).\\n * Impuesto sobre Transmisiones Patrimoniales (ITP): Se aplicará el tipo impositivo vigente en la Comunidad Autónoma de Andalucía (generalmente el 7%, sin perjuicio de tipos reducidos del 3,5%, 1,2% o 1% aplicables según las circunstancias personales del comprador o las características del inmueble). El impuesto se devenga sobre el Valor de Referencia de Catastro o el precio de venta, aquel que resulte superior.\\n * Gastos de Notaría: Los honorarios notariales se calcularán conforme al arancel oficial regulado en el Anexo I, del Real Decreto 1426/1989, de 17 de noviembre, por el que se aprueba el arancel Notarial.\\n * Gastos de Registro: La inscripción en el Registro de la Propiedad se facturará según el arancel oficial establecido en el ANEXO I, del Real Decreto 1427/1989, de 17 de noviembre, por el que se aprueba el arancel Notarial.\\n * Gastos de Gestión (Gestoría): Los honorarios por la tramitación administrativa, liquidación de impuestos e inscripción registral ascienden a [600 aprox.] € (IVA incluido).\\n* Para cumplir con la normativa vigente tenemos a disposición del cliente la Ficha de segundas y ulteriores transmisiones de inmuebles. El precio anunciado no tiene caducidad, pero puede sufrir alteraciones sin previo aviso.\\n Para una información exhaustiva sobre el funcionamiento, tipos impositivos y bonificaciones del ITP en Andalucía, puede visitar la página: https://www.juntadeandalucia.es/organismos/economiahaciendayfondoseuropeos/areas/tributos-juego/tributos/paginas/impuestos-cedidos-transmisiones.html\\n","detail":{"es-ES":"/es/comprar/vivienda/cordoba-capital/trastero-patio/189024168/d"},"detailWithParams":{"es-ES":"/es/comprar/vivienda/cordoba-capital/trastero-patio/189024168/d?from=list"},"dynamicFeatures":[],"externalContactUrl":null,"features":[{"key":"cabinets","value":2,"maxValue":0,"minValue":0},{"key":"storage_room","value":11,"maxValue":0,"minValue":0},{"key":"yard","value":16,"maxValue":0,"minValue":0},{"key":"household_appliances","value":21,"maxValue":0,"minValue":0},{"key":"equiped_kitchen","value":131,"maxValue":0,"minValue":0},{"key":"antiquity","value":7,"maxValue":0,"minValue":0},{"key":"bathrooms","value":2,"maxValue":0,"minValue":0},{"key":"conservationStatus","value":4,"maxValue":0,"minValue":0},{"key":"floor","value":3,"maxValue":0,"minValue":0},{"key":"hotWater","value":2,"maxValue":0,"minValue":0},{"key":"orientation","valu E CUATRO DORMITORIOS EN ENCINAREJO-CÓRDOBA\\n\\nDescubre esta maravillosa casa adosada, un verdadero hogar de ensueño situado en la localidad de Encinarejo, Córdoba. Con cuatro amplios y luminosos dormitorios, este inmueble ofrece el espacio perfecto para familias que buscan confort y bienestar.\\n\\nEn la planta baja encontraremos la cocina independiente equipada con electrodomésticos, salón, aseo y garaje. El exterior en esta planta es simplemente espectacular: cuenta con un hermoso porche trasero con pérgola, y una piscina privada de 15m2, donde podrás disfrutar momentos inolvidables al aire libre durante los cálidos días andaluces.\\n\\nEn la planta alta, o zona de noche, se encuentran los cuatro dormitorios con armarios empotrados, el principal con baño en suite y un baño adicional. Su impecable estado refleja el cuidado con el que ha sido mantenida a lo largo del tiempo; cada rincón está diseñado con materiales de alta calidad e instalaciones modernas que garantizan una vida cómoda y práctica. Desde esta planta se podría dar  acceso a una buhardilla para acondicionar como espacio extra de almacenamiento.\\n\\nEsta propiedad no solo destaca por su estética atractiva sino también por su ubicación estratégica cerca de servicios esenciales como escuelas, supermercados y parques recreativos. No pierdas la oportunidad de hacerla tuya; ¡el hogar ideal te espera!\\n\\nEn cumplimiento al artículo 5º del decreto 21805 de 11 de octubre, por el que se aprueba el reglamento de información al consumidor en la compraventa y arrendamiento de vivienda en Andalucía, se informa que en el precio del inmueble reflejando, no figuran los gastos derivados de la compraventa, tales como: impuesto de transmisiones patrimoniales, impuesto de actos jurídicos documentados, notaría, registro de la propiedad y honorarios de la agencia inmobiliaria","detail":{"es-ES":"/es/comprar/vivienda/cordoba-capital/aire-acondicionado-parking-jardin-terraza-trastero-patio-piscina/189296702/d"},"detailWit
